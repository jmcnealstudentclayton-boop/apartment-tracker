<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apartment Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {} },
      darkMode: 'class',
    }
  </script>
</head>
<body class="dark bg-slate-900 text-slate-100 min-h-screen">

  <div class="max-w-4xl mx-auto px-4 py-8 space-y-8">

    <!-- Header -->
    <header>
      <h1 class="text-xl font-semibold text-slate-100 tracking-tight">Apartment Tracker</h1>
      <p class="text-slate-500 text-sm mt-0.5">Personal apartment tracking — paste a URL to import</p>
    </header>

    <!-- Import section -->
    <section aria-label="Import apartment">
      <form id="import-form" class="flex gap-2">
        <input
          id="url-input"
          type="url"
          placeholder="https://www.apartments.com/listing/…"
          required
          class="flex-1 bg-slate-800 border border-slate-700 rounded-md px-3 py-2 text-sm
                 text-slate-100 placeholder-slate-500
                 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30"
        />
        <button
          id="fetch-btn"
          type="submit"
          class="shrink-0 bg-blue-600 hover:bg-blue-500 disabled:opacity-50
                 text-white text-sm font-medium px-5 py-2 rounded-md transition-colors"
        >
          Fetch
        </button>
      </form>

      <!-- Preview panel: populated by dashboard.js after a successful fetch -->
      <div id="preview-panel" class="hidden"></div>
    </section>

    <!-- Saved apartments -->
    <section aria-label="Saved apartments">
      <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-3">Saved Apartments</h2>
      <div id="apartment-list" class="grid gap-3 sm:grid-cols-2">
        <!-- cards injected by dashboard.js -->
      </div>
    </section>

  </div>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
