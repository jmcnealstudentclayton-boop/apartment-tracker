name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Write config.js from GitHub Secrets — never stored in repo
      - name: Generate config.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os
          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_ANON_KEY']
          with open('js/config.js', 'w') as f:
              f.write(f"export const SUPABASE_URL = '{url}';\n")
              f.write(f"export const SUPABASE_ANON_KEY = '{key}';\n")
              f.write("export const FETCH_FN_URL = SUPABASE_URL + '/functions/v1/fetch-apartment';\n")
          print('config.js written OK')
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
